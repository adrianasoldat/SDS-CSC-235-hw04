<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Game of Thrones Network Analysis</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Game of Thrones Character Network</h1>
    
    <div class="controls">
        <label>Min Strength:</label>
        <input type="range" id="weightFilter" min="1" max="50" value="3">
        <span id="weightValue">3</span>
        <button id="resetBtn">Reset</button>
    </div>

    <div style="display: flex; gap: 20px;">
        <svg id="networkSvg" width="800" height="600"></svg>
        
        <div id="nodeDetails" style="width: 200px; padding: 15px; background: #f0f0f0;">
            <p>Click a node</p>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
