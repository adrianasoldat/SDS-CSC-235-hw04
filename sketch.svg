<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520"
     font-family="Georgia, serif">

  <!-- Background -->
  <rect width="800" height="520" fill="#0d0d0f" rx="6"/>

  <!-- Header bar -->
  <rect x="10" y="10" width="780" height="58" fill="#13131a" rx="3"/>
  <line x1="10" y1="68" x2="790" y2="68" stroke="#c9a84c" stroke-width="1.5"/>
  <text x="26" y="28" font-size="9" fill="#8899aa" font-style="italic">George R.R. Martin · A Song of Ice and Fire</text>
  <text x="26" y="48" font-size="18" fill="#c9a84c" font-weight="bold" letter-spacing="2">GAME OF THRONES</text>
  <text x="26" y="62" font-size="9" fill="#8899aa" font-style="italic">Character Co-occurrence Network — Book 1</text>

  <!-- Legend dots in header -->
  <circle cx="350" cy="38" r="5" fill="#8ab4d4"/><text x="358" y="42" font-size="8" fill="#6b6577">Stark</text>
  <circle cx="395" cy="38" r="5" fill="#c9a84c"/><text x="403" y="42" font-size="8" fill="#6b6577">Lannister</text>
  <circle cx="450" cy="38" r="5" fill="#9b59b6"/><text x="458" y="42" font-size="8" fill="#6b6577">King's Landing</text>
  <circle cx="525" cy="38" r="5" fill="#e8503a"/><text x="533" y="42" font-size="8" fill="#6b6577">Targaryen</text>
  <circle cx="580" cy="38" r="5" fill="#4a9e6b"/><text x="588" y="42" font-size="8" fill="#6b6577">Night's Watch</text>

  <!-- Network pane -->
  <rect x="10" y="75" width="558" height="415" fill="#080810" rx="3"/>

  <!-- Fake network edges -->
  <line x1="200" y1="270" x2="300" y2="210" stroke="#c9a84c" stroke-width="2.5" stroke-opacity="0.8"/>
  <line x1="200" y1="270" x2="130" y2="330" stroke="#3a3a55" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="200" y1="270" x2="290" y2="340" stroke="#3a3a55" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="300" y1="210" x2="390" y2="255" stroke="#3a3a55" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="300" y1="210" x2="360" y2="155" stroke="#3a3a55" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="390" y1="255" x2="455" y2="310" stroke="#3a3a55" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="290" y1="340" x2="365" y2="390" stroke="#3a3a55" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="130" y1="330" x2="100" y2="260" stroke="#3a3a55" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="100" y1="260" x2="120" y2="185" stroke="#3a3a55" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="120" y1="185" x2="200" y2="270" stroke="#3a3a55" stroke-width="2" stroke-opacity="0.4"/>

  <!-- Nodes -->
  <!-- Eddard (Stark, focused) -->
  <circle cx="200" cy="270" r="20" fill="#8ab4d4" stroke="#e8c76a" stroke-width="2.5" filter="url(#glow)"/>
  <text x="200" y="248" text-anchor="middle" font-size="9" fill="#d4cfc8">Eddard Stark</text>

  <circle cx="300" cy="210" r="16" fill="#c9a84c" stroke="#0d0d0f" stroke-width="1.5"/>
  <text x="300" y="192" text-anchor="middle" font-size="9" fill="#d4cfc8">Tyrion</text>

  <circle cx="130" cy="330" r="12" fill="#8ab4d4" stroke="#0d0d0f" stroke-width="1.5" opacity="0.25"/>
  <circle cx="290" cy="340" r="13" fill="#8ab4d4" stroke="#0d0d0f" stroke-width="1.5" opacity="0.25"/>
  <circle cx="390" cy="255" r="10" fill="#9b59b6" stroke="#0d0d0f" stroke-width="1.5" opacity="0.25"/>
  <circle cx="455" cy="310" r="8" fill="#e8503a" stroke="#0d0d0f" stroke-width="1.5" opacity="0.25"/>
  <circle cx="360" cy="155" r="9" fill="#4a9e6b" stroke="#0d0d0f" stroke-width="1.5" opacity="0.25"/>
  <circle cx="365" cy="390" r="7" fill="#8ab4d4" stroke="#0d0d0f" stroke-width="1.5" opacity="0.25"/>
  <circle cx="100" cy="260" r="7" fill="#9b59b6" stroke="#0d0d0f" stroke-width="1.5" opacity="0.1"/>
  <circle cx="120" cy="185" r="6" fill="#c9a84c" stroke="#0d0d0f" stroke-width="1.5" opacity="0.1"/>

  <!-- Tooltip -->
  <rect x="215" y="228" width="150" height="60" fill="#0e0e18" stroke="#c9a84c" stroke-width="1" rx="3"/>
  <text x="222" y="244" font-size="10" fill="#e8c76a" font-weight="bold">Eddard Stark</text>
  <rect x="222" y="248" width="52" height="12" fill="#8ab4d422" rx="2"/>
  <text x="248" y="258" text-anchor="middle" font-size="7" fill="#8ab4d4">Stark</text>
  <text x="222" y="272" font-size="8" fill="#d4cfc8">Co-occurrence: 1284</text>
  <text x="222" y="283" font-size="7" fill="#6b6577">Click to focus · click again to reset</text>

  <!-- Sidebar -->
  <rect x="575" y="75" width="215" height="415" fill="#13131a" rx="3"/>
  <line x1="586" y1="103" x2="782" y2="103" stroke="#2e2e44" stroke-width="1"/>

  <text x="586" y="97" font-size="11" fill="#c9a84c" font-weight="bold" letter-spacing="1">TOP CHARACTERS</text>
  <text x="586" y="114" font-size="8" fill="#6b6577" font-style="italic">by co-occurrence weight</text>

  <!-- Bar rows -->
  <g transform="translate(586,122)">
    <text x="82" y="14" text-anchor="end" font-size="10" fill="#e8c76a">Eddard Stark</text>
    <rect x="85" y="2" width="100" height="14" fill="#8ab4d4" rx="2" opacity="1"/>
    <text x="189" y="13" font-size="8" fill="#6b6577">1284</text>

    <text x="82" y="32" text-anchor="end" font-size="10" fill="#6b6577">Robert Baratheon</text>
    <rect x="85" y="20" width="65" height="14" fill="#9b59b6" rx="2" opacity="0.25"/>

    <text x="82" y="50" text-anchor="end" font-size="10" fill="#6b6577">Jon Snow</text>
    <rect x="85" y="38" width="55" height="14" fill="#4a9e6b" rx="2" opacity="0.25"/>

    <text x="82" y="68" text-anchor="end" font-size="10" fill="#6b6577">Tyrion Lannister</text>
    <rect x="85" y="56" width="50" height="14" fill="#c9a84c" rx="2" opacity="0.25"/>

    <text x="82" y="86" text-anchor="end" font-size="10" fill="#6b6577">Sansa Stark</text>
    <rect x="85" y="74" width="38" height="14" fill="#8ab4d4" rx="2" opacity="0.25"/>

    <text x="120" y="115" font-size="14" fill="#6b6577">⋮</text>
  </g>

  <!-- Focus panel -->
  <line x1="586" y1="268" x2="782" y2="268" stroke="#2e2e44" stroke-width="1"/>
  <text x="586" y="286" font-size="12" fill="#e8c76a" font-weight="bold">Eddard Stark</text>
  <text x="586" y="300" font-size="9" fill="#6b6577" font-style="italic">House / Group: Stark</text>
  <text x="586" y="314" font-size="9" fill="#6b6577" font-style="italic">18 direct connections</text>
  <text x="586" y="330" font-size="9" fill="#6b6577">Connected to:</text>
  <rect x="586" y="335" width="44" height="14" fill="#1a1a26" rx="2"/>
  <text x="608" y="345" text-anchor="middle" font-size="8" fill="#d4cfc8">Jon Snow</text>
  <rect x="635" y="335" width="52" height="14" fill="#1a1a26" rx="2"/>
  <text x="661" y="345" text-anchor="middle" font-size="8" fill="#d4cfc8">Catelyn</text>
  <rect x="586" y="354" width="55" height="14" fill="#1a1a26" rx="2"/>
  <text x="613" y="364" text-anchor="middle" font-size="8" fill="#d4cfc8">Robb Stark</text>

  <!-- Footer -->
  <rect x="10" y="498" width="780" height="16" fill="#13131a" rx="2"/>
  <text x="400" y="510" text-anchor="middle" font-size="8" fill="#6b6577" font-style="italic">
    Data: Game of Thrones character co-occurrence, Book 1 · Built with D3.js v7
  </text>

  <!-- Annotations -->
  <text x="22" y="458" font-size="9" fill="#c9a84c">① Force-directed network — node size ∝ co-occurrence weight, color = house</text>
  <text x="22" y="472" font-size="9" fill="#c9a84c">② Bar chart — top 15 characters, synced with network focus</text>
  <text x="22" y="486" font-size="9" fill="#c9a84c">③ Hover tooltip  ④ Click-to-focus neighborhood  ⑤ Drag nodes  ⑥ Neighbor tags</text>
</svg>
